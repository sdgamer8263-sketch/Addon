<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKA HOSTING ADDONS</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
            /* Background Image */
            background-image: url('giphy.gif');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        /* --- LOGO STYLES --- */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #site-logo {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid #00ff88;
            padding: 2px;
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        h1 {
            text-align: center;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 30px;
        }

        /* --- FILE LIST CONTAINER --- */
        #file-list {
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- FILE CARD DESIGN --- */
        .file-card {
            background: rgba(20, 20, 20, 0.9);
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .file-card:hover {
            border-color: #00ff88;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
        }

        .file-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #ffffff;
        }

        .download-btn {
            background: #00ff88;
            color: #000;
            padding: 8px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 900;
            font-size: 0.9em;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .download-btn:hover {
            background: #ffffff;
            box-shadow: 0 0 10px #00ff88;
        }

        /* Status Text */
        .status-text {
            text-align: center;
            font-size: 1.2em;
            color: #ccc;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="file_00000000387071faa7c92db633a8f726.png" alt="SKA Logo" id="site-logo" onerror="this.style.display='none'">
    </div>

    <h1>SKA HOSTING ADDONS</h1>

    <div id="file-list">
        <p class="status-text">Loading addons...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const username = 'sdgamer8263-sketch';
        const repoName = 'Addon';  
        const folderPath = '';     
        // ---------------------

        async function loadFiles() {
            const listContainer = document.getElementById('file-list');
            const apiUrl = `https://api.github.com/repos/${username}/${repoName}/contents/${folderPath}`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    listContainer.innerHTML = `<p class="status-text" style="color:#ff4444">Error: Repository connect nahi hua.</p>`;
                    return;
                }

                const data = await response.json();
                listContainer.innerHTML = ''; 

                let fileCount = 0;

                data.forEach(file => {
                    // Check logic: Kya file .mcaddon ya .mcpack hai?
                    const isMcAddon = file.name.endsWith('.mcaddon');
                    const isMcPack = file.name.endsWith('.mcpack');

                    // Agar dono nahi hain, to RETURN (file ko skip karo)
                    if (!isMcAddon && !isMcPack) return;

                    // Display Logic: Extension hatao
                    let displayName = file.name;
                    if (isMcAddon) displayName = file.name.replace('.mcaddon', '');
                    if (isMcPack) displayName = file.name.replace('.mcpack', '');

                    fileCount++;

                    // HTML Create karo
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    card.innerHTML = `
                        <span class="file-name">${displayName}</span>
                        <a href="${file.download_url}" class="download-btn" download>Download</a>
                    `;
                    listContainer.appendChild(card);
                });

                if (fileCount === 0) {
                    listContainer.innerHTML = `<p class="status-text">Koi .mcaddon ya .mcpack file nahi mili.</p>`;
                }

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<p class="status-text" style="color:#ff4444">Connection Failed.</p>`;
            }
        }

        loadFiles();
    </script>

</body>
</html>
