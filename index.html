<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Addons Store</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
            /* Background GIF settings */
            background-image: url('giphy.gif');
            background-size: cover;       /* Pure screen ko cover karega */
            background-position: center;  /* Center me rahega */
            background-attachment: fixed; /* Scroll karne par background hilega nahi */
            background-repeat: no-repeat;
        }

        /* Dark Overlay logic to make text readable over the GIF */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); /* 60% Dark overlay */
            z-index: -1;
        }

        /* --- LOGO STYLES --- */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        #site-logo {
            width: 150px;       /* Logo ka size adjust kar sakte ho */
            height: auto;
            border-radius: 50%; /* Agar round logo chahiye to ye rakho, nahi to hata do */
            border: 2px solid #00ff88;
            padding: 5px;
            background: rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
            color: #00ff88;
            text-shadow: 2px 2px 4px #000;
            margin-top: 10px;
        }

        /* --- FILE LIST CONTAINER --- */
        #file-list {
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- FILE CARD DESIGN --- */
        .file-card {
            background: rgba(30, 30, 30, 0.85); /* Thoda transparent black card */
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #444;
            backdrop-filter: blur(5px); /* Piche ka background thoda blur karega */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, border-color 0.2s;
        }

        .file-card:hover {
            border-color: #00ff88;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,255,136, 0.2);
        }

        .file-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #f0f0f0;
        }

        .download-btn {
            background: linear-gradient(45deg, #00ff88, #00cc6a);
            color: #000;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
            transition: opacity 0.2s;
        }
        .download-btn:hover {
            opacity: 0.9;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .file-card { flex-direction: column; text-align: center; gap: 10px; }
            #site-logo { width: 120px; }
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="file_00000000387071faa7c92db633a8f726.png" alt="Site Logo" id="site-logo">
    </div>

    <h1>Addons & Mods</h1>

    <div id="file-list">
        <p style="text-align:center; color:#ccc;">Loading files from GitHub...</p>
    </div>

    <script>
        // --- CONFIGURATION ---
        const username = 'sdgamer8263-sketch';  // Tumhara GitHub Username
        const repoName = 'YOUR_REPO_NAME';      // Yaha apne Repo ka naam likho! (Important)
        const folderPath = '';                  // Agar files root folder me hain to khali rakho
        // ---------------------

        async function loadFiles() {
            const listContainer = document.getElementById('file-list');
            const apiUrl = `https://api.github.com/repos/${username}/${repoName}/contents/${folderPath}`;

            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    listContainer.innerHTML = `<p style="color:red; text-align:center;">Error: Repo '${repoName}' nahi mila. Check karo naam sahi hai?</p>`;
                    return;
                }

                const data = await response.json();
                listContainer.innerHTML = ''; // Clear "Loading..." text

                // System files to ignore
                const ignoreList = ['index.html', 'ccccccccccc.gif', 'gggggggggg.png', 'CNAME', '.gitattributes'];

                data.forEach(file => {
                    // Ignore system files and folders
                    if (ignoreList.includes(file.name) || file.type === 'dir') return;

                    // REMOVE EXTENSION LOGIC (Tumhara main requirement)
                    // Jo bhi last dot (.) ke baad hai wo hat jayega. 
                    // Action.mcaddon -> Action
                    const displayName = file.name.replace(/\.[^/.]+$/, ""); 

                    // Create HTML Card
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    card.innerHTML = `
                        <span class="file-name">${displayName}</span>
                        <a href="${file.download_url}" class="download-btn" download>Download</a>
                    `;
                    listContainer.appendChild(card);
                });

                if (listContainer.innerHTML === '') {
                    listContainer.innerHTML = `<p style="text-align:center;">Koi files nahi mili.</p>`;
                }

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<p style="color:red; text-align:center;">Kuch gadbad ho gayi. Console check karo.</p>`;
            }
        }

        // Run the function
        loadFiles();
    </script>

</body>
</html>
